name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MYOL_AWS_REGION: ${{ vars.MYOL_AWS_REGION }}
      MYOL_WEB_BUCKET: ${{ vars.MYOL_WEB_BUCKET }}
      MYOL_DATA_BUCKET: ${{ vars.MYOL_DATA_BUCKET }}
      MYOL_LAMBDA_FUNCTION_NAME: ${{ vars.MYOL_LAMBDA_FUNCTION_NAME }}
      VITE_API_ENDPOINT: ${{ vars.MYOL_API_ENDPOINT }}
      MYOL_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.MYOL_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      MYOL_AUTH_CONFIG_JSON: ${{ secrets.MYOL_AUTH_CONFIG_JSON }}
      MYOL_AUTH_USERS_CONFIG_JSON: ${{ secrets.MYOL_AUTH_USERS_CONFIG_JSON }}
      VITE_AUTH_CONFIG_KEY: config/auth.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: |
          npm run build

      - name: Validate required deployment env
        run: |
          for name in MYOL_AWS_REGION MYOL_WEB_BUCKET MYOL_DATA_BUCKET MYOL_LAMBDA_FUNCTION_NAME VITE_API_ENDPOINT MYOL_CLOUDFRONT_DISTRIBUTION_ID AWS_DEPLOY_ROLE_ARN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required value: $name" >&2
              exit 1
            fi
          done

          if [ -z "${MYOL_AUTH_CONFIG_JSON:-}" ] && [ -z "${MYOL_AUTH_USERS_CONFIG_JSON:-}" ]; then
            echo "Missing auth config secret. Set MYOL_AUTH_CONFIG_JSON." >&2
            exit 1
          fi

      - name: Validate auth config JSON
        run: |
          AUTH_CONFIG_JSON="${MYOL_AUTH_CONFIG_JSON:-$MYOL_AUTH_USERS_CONFIG_JSON}"
          AUTH_CONFIG_JSON="$AUTH_CONFIG_JSON" node -e "const raw=process.env.AUTH_CONFIG_JSON||''; let parsed; try { parsed=JSON.parse(raw); } catch { console.error('Auth config is not valid JSON'); process.exit(1); } if (!parsed || typeof parsed.passcodeHash !== 'string' || parsed.passcodeHash.trim() === '') { console.error('Auth config must contain a non-empty passcodeHash string'); process.exit(1); }"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.MYOL_AWS_REGION }}

      - name: Install Lambda dependencies
        run: npm --prefix lambda/presigned-url ci

      - name: Build Lambda
        run: npm --prefix lambda/presigned-url run build

      - name: Deploy Lambda code
        run: |
          tmp_dir="$(mktemp -d -t myol-lambda.XXXXXX)"
          zip_path="$tmp_dir/lambda.zip"
          (cd lambda/presigned-url && zip -q "$zip_path" dist/index.js)
          aws lambda update-function-code \
            --function-name "$MYOL_LAMBDA_FUNCTION_NAME" \
            --zip-file "fileb://$zip_path" \
            --region "$MYOL_AWS_REGION" >/dev/null
          aws lambda wait function-updated \
            --function-name "$MYOL_LAMBDA_FUNCTION_NAME" \
            --region "$MYOL_AWS_REGION"

      - name: Upload auth config to S3
        run: |
          tmp_file="$(mktemp -t myol-auth-config.XXXXXX.json)"
          AUTH_CONFIG_JSON="${MYOL_AUTH_CONFIG_JSON:-$MYOL_AUTH_USERS_CONFIG_JSON}"
          printf '%s' "$AUTH_CONFIG_JSON" > "$tmp_file"
          aws s3 cp "$tmp_file" "s3://${MYOL_DATA_BUCKET}/config/auth.json" \
            --content-type "application/json; charset=utf-8" \
            --region "$MYOL_AWS_REGION"

      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ "s3://${MYOL_WEB_BUCKET}/" --delete --region "$MYOL_AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$MYOL_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*' >/dev/null
