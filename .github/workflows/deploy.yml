name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MYOL_AWS_REGION: ${{ vars.MYOL_AWS_REGION }}
      MYOL_WEB_BUCKET: ${{ vars.MYOL_WEB_BUCKET }}
      MYOL_LAMBDA_FUNCTION_NAME: ${{ vars.MYOL_LAMBDA_FUNCTION_NAME }}
      VITE_API_ENDPOINT: ${{ vars.MYOL_API_ENDPOINT }}
      MYOL_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.MYOL_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: |
          npm run build

      - name: Validate required deployment env
        run: |
          for name in MYOL_AWS_REGION MYOL_WEB_BUCKET MYOL_LAMBDA_FUNCTION_NAME VITE_API_ENDPOINT MYOL_CLOUDFRONT_DISTRIBUTION_ID AWS_DEPLOY_ROLE_ARN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required value: $name" >&2
              exit 1
            fi
          done
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.MYOL_AWS_REGION }}

      - name: Install Lambda dependencies
        run: npm --prefix lambda/presigned-url ci

      - name: Build Lambda
        run: npm --prefix lambda/presigned-url run build

      - name: Deploy Lambda code
        run: |
          tmp_dir="$(mktemp -d -t myol-lambda.XXXXXX)"
          zip_path="$tmp_dir/lambda.zip"
          (cd lambda/presigned-url && zip -q "$zip_path" dist/index.js)
          aws lambda update-function-code \
            --function-name "$MYOL_LAMBDA_FUNCTION_NAME" \
            --zip-file "fileb://$zip_path" \
            --region "$MYOL_AWS_REGION" >/dev/null
          aws lambda wait function-updated \
            --function-name "$MYOL_LAMBDA_FUNCTION_NAME" \
            --region "$MYOL_AWS_REGION"

      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ "s3://${MYOL_WEB_BUCKET}/" --delete --region "$MYOL_AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$MYOL_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*' >/dev/null
