name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MYOL_AWS_REGION: ${{ vars.MYOL_AWS_REGION }}
      MYOL_WEB_BUCKET: ${{ vars.MYOL_WEB_BUCKET }}
      MYOL_DATA_BUCKET: ${{ vars.MYOL_DATA_BUCKET }}
      VITE_API_ENDPOINT: ${{ vars.MYOL_API_ENDPOINT }}
      MYOL_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.MYOL_CLOUDFRONT_DISTRIBUTION_ID }}
      MYOL_AUTH_USERS_CONFIG_JSON: ${{ secrets.MYOL_AUTH_USERS_CONFIG_JSON }}
      VITE_AUTH_CONFIG_KEY: config/auth-users.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: |
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.MYOL_AWS_REGION }}

      - name: Validate required deployment env
        run: |
          for name in MYOL_AWS_REGION MYOL_WEB_BUCKET MYOL_DATA_BUCKET VITE_API_ENDPOINT MYOL_CLOUDFRONT_DISTRIBUTION_ID; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required value: $name" >&2
              exit 1
            fi
          done

      - name: Upload auth config to S3
        if: ${{ env.MYOL_AUTH_USERS_CONFIG_JSON != '' }}
        run: |
          tmp_file="$(mktemp -t myol-auth-config.XXXXXX.json)"
          printf '%s' "$MYOL_AUTH_USERS_CONFIG_JSON" > "$tmp_file"
          aws s3 cp "$tmp_file" "s3://${MYOL_DATA_BUCKET}/config/auth-users.json" \
            --content-type "application/json; charset=utf-8" \
            --region "$MYOL_AWS_REGION"

      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ "s3://${MYOL_WEB_BUCKET}/" --delete --region "$MYOL_AWS_REGION"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$MYOL_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*' >/dev/null
